<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'#' + ${room.name} + ' — Nexus Chat'">Room — Nexus Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-icon">⬡</span>
            <span class="brand-name">NEXUS</span>
            <span class="ws-dot offline" id="wsDot"></span>
        </div>
        <div class="sidebar-tabs">
            <a th:href="@{/chat}"         class="tab-btn active">ROOMS</a>
            <a th:href="@{/chat/members}" class="tab-btn">MEMBERS</a>
        </div>
        <div class="sidebar-content">
            <div class="section-label">CHANNELS</div>
            <th:block th:each="r : ${rooms}">
                <a th:href="@{/chat/rooms/{id}(id=${r.id})}"
                   class="room-link"
                   th:classappend="${r.id == room.id} ? ' active' : ''"
                   th:text="'# ' + ${r.name}"></a>
            </th:block>
        </div>
        <div class="sidebar-user">
            <div class="avatar sm"
                 th:style="'background:' + ${me.avatarColor}"
                 th:text="${me.displayName.substring(0,1).toUpperCase()}"></div>
            <div class="user-info">
                <div class="user-name" th:text="${me.displayName}"></div>
                <div class="user-status" id="connStatus">● connecting...</div>
            </div>
            <form th:action="@{/auth/logout}" method="post" style="margin:0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="logout-btn" title="Sign out">⏏</button>
            </form>
        </div>
    </aside>

    <!-- Main chat area -->
    <main class="main-area chat-layout">

        <!-- Room header -->
        <div class="chat-header">
            <div class="chat-header-left">
                <span class="chat-hash">#</span>
                <div>
                    <div class="chat-room-name" th:text="${room.name}"></div>
                    <div class="chat-room-desc"
                         th:if="${room.description != null && !room.description.isEmpty()}"
                         th:text="${room.description}"></div>
                </div>
            </div>
            <div class="chat-header-right">
                <span class="member-count" th:text="${room.members.size()} + ' members'"></span>
                <form th:action="@{/chat/rooms/{id}/leave(id=${room.id})}" method="post" style="margin:0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-ghost">Leave</button>
                </form>
            </div>
        </div>

        <!-- messagesArea is the SCROLL container — everything goes inside it -->
        <div class="messages-area" id="messagesArea">

            <!-- Server-rendered history -->
            <th:block th:each="msg : ${messages}">
                <div th:if="${msg.type.name() == 'SYSTEM' || msg.type.name() == 'JOIN' || msg.type.name() == 'LEAVE'}"
                     class="msg-system"
                     th:text="'— ' + ${msg.content} + ' —'"></div>

                <div th:unless="${msg.type.name() == 'SYSTEM' || msg.type.name() == 'JOIN' || msg.type.name() == 'LEAVE'}"
                     class="msg-row"
                     th:classappend="${msg.sender.username == me.username} ? ' own' : ''">
                    <div class="avatar"
                         th:style="'background:' + ${msg.sender.avatarColor}"
                         th:text="${msg.sender.displayName.substring(0,1).toUpperCase()}"></div>
                    <div class="msg-body">
                        <div class="msg-meta">
                            <span class="msg-author"
                                  th:text="${msg.sender.displayName}"
                                  th:style="${msg.sender.username == me.username} ? 'color:#22c55e' : ''"></span>
                            <span class="msg-time"
                                  th:text="${#temporals.format(msg.sentAt,'HH:mm')}"></span>
                        </div>
                        <div class="msg-text" th:text="${msg.content}"></div>
                    </div>
                </div>
            </th:block>

            <!-- JS appends new real-time messages here -->
            <div id="dynamicMessages"></div>

            <!-- Typing indicator -->
            <div class="typing-indicator" id="typingIndicator" style="display:none">
                <span class="typing-dots"><i></i><i></i><i></i></span>
                <span id="typingText"></span>
            </div>
        </div>

        <!-- Input bar -->
        <div class="chat-input-area">
            <div id="disconnectedBanner"
                 style="display:none; background:#450a0a; color:#fca5a5;
                        font-size:11px; padding:6px 14px; border-radius:6px; margin-bottom:8px;">
                ⚠ Disconnected — trying to reconnect...
            </div>
            <div class="chat-input-box">
                <input type="text" id="msgInput"
                       th:placeholder="'Message #' + ${room.name}"
                       autocomplete="off" maxlength="2000"/>
                <button id="sendBtn" class="btn btn-primary send-btn" disabled>SEND</button>
            </div>
            <div class="input-hint">Press Enter to send</div>
        </div>
    </main>

    <!-- Members panel -->
    <aside class="members-panel">
        <div class="section-label" style="padding:14px 12px 8px">
            MEMBERS — <span th:text="${room.members.size()}"></span>
        </div>
        <th:block th:each="u : ${users}">
            <div class="member-item">
                <div class="presence-wrap">
                    <div class="avatar sm"
                         th:style="'background:' + ${u.avatarColor}"
                         th:text="${u.displayName.substring(0,1).toUpperCase()}"></div>
                    <div class="presence-dot"
                         th:classappend="${u.status.name() == 'ONLINE'} ? ' online' : ''"></div>
                </div>
                <div>
                    <div class="member-name"   th:text="${u.displayName}"></div>
                    <div class="member-status" th:text="${u.status.name()}"></div>
                </div>
            </div>
        </th:block>
    </aside>
</div>

<!-- MUST be before chat.js -->
<script th:inline="javascript">
    /*<![CDATA[*/
    var ROOM_ID     = /*[[${room.id}]]*/ 0;
    var MY_USERNAME = /*[[${me.username}]]*/ '';
    var MY_NAME     = /*[[${me.displayName}]]*/ '';
    var MY_COLOR    = /*[[${me.avatarColor}]]*/ '#4ECDC4';
    /*]]>*/
</script>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<script th:src="@{/js/chat.js}"></script>
</body>
</html>
