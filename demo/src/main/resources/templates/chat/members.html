<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Members — Nexus Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-icon">⬡</span>
            <span class="brand-name">NEXUS</span>
        </div>
        <div class="sidebar-tabs">
            <a th:href="@{/chat}"         class="tab-btn">ROOMS</a>
            <a th:href="@{/chat/members}" class="tab-btn active">MEMBERS</a>
        </div>
        <div class="sidebar-content">
            <div class="section-label">ALL MEMBERS</div>
            <th:block th:each="u : ${users}">
                <div class="member-item sidebar-member">
                    <div class="avatar sm" th:style="'background:' + ${u.avatarColor}"
                         th:text="${u.displayName.substring(0,1).toUpperCase()}"></div>
                    <span class="member-name" th:text="${u.displayName}"></span>
                </div>
            </th:block>
        </div>
        <div class="sidebar-user">
            <div class="avatar sm" th:style="'background:' + ${me.avatarColor}"
                 th:text="${me.displayName.substring(0,1).toUpperCase()}"></div>
            <div class="user-info">
                <div class="user-name" th:text="${me.displayName}"></div>
                <div class="user-status">● online</div>
            </div>
            <form th:action="@{/auth/logout}" method="post" style="margin:0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="logout-btn" title="Sign out">⏏</button>
            </form>
        </div>
    </aside>

    <!-- Main -->
    <main class="main-area">
        <div class="home-header">
            <h2 class="page-title">Members</h2>
        </div>
        <div class="members-grid">
            <th:block th:each="u : ${users}">
                <div class="member-card">
                    <div class="avatar lg" th:style="'background:' + ${u.avatarColor}"
                         th:text="${u.displayName.substring(0,1).toUpperCase()}"></div>
                    <div class="member-card-name" th:text="${u.displayName}"></div>
                    <div class="member-card-username" th:text="'@' + ${u.username}"></div>
                    <div class="member-card-status"
                         th:text="${u.status.name()}"
                         th:classappend="${u.status.name() == 'ONLINE'} ? ' status-online' : ' status-offline'"></div>
                </div>
            </th:block>
        </div>
    </main>
</div>
</body>
</html>
