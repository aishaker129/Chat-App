<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Rooms — Nexus Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-icon">⬡</span>
            <span class="brand-name">NEXUS</span>
        </div>
        <div class="sidebar-tabs">
            <a th:href="@{/chat}"         class="tab-btn active">ROOMS</a>
            <a th:href="@{/chat/members}" class="tab-btn">MEMBERS</a>
        </div>
        <div class="sidebar-content">
            <div class="section-label">CHANNELS</div>
            <th:block th:each="room : ${rooms}">
                <a th:href="@{/chat/rooms/{id}(id=${room.id})}" class="room-link">
                    <span class="room-hash">#</span>
                    <span class="room-name" th:text="${room.name}"></span>
                    <span class="room-count" th:text="${room.members.size()}"></span>
                </a>
            </th:block>
        </div>
        <div class="sidebar-user">
            <div class="avatar sm"
                 th:style="'background:' + ${me.avatarColor}"
                 th:text="${me.displayName.substring(0,1).toUpperCase()}"></div>
            <div class="user-info">
                <div class="user-name"   th:text="${me.displayName}"></div>
                <div class="user-status">● online</div>
            </div>
            <form th:action="@{/auth/logout}" method="post" style="margin:0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="logout-btn" title="Sign out">⏏</button>
            </form>
        </div>
    </aside>

    <!-- Main -->
    <main class="main-area">
        <div class="home-header">
            <h2 class="page-title">Channels</h2>
        </div>

        <!-- Flash messages -->
        <div th:if="${success}" class="flash flash-success" th:text="${success}"></div>
        <div th:if="${info}"    class="flash flash-info"    th:text="${info}"></div>

        <!-- Room cards grid -->
        <div class="room-grid">
            <th:block th:each="room : ${rooms}">
                <div class="room-card">
                    <div class="room-card-header">
                        <span class="room-card-hash">#</span>
                        <span class="room-card-name" th:text="${room.name}"></span>
                    </div>
                    <p class="room-card-desc"
                       th:text="${room.description != null && !room.description.isEmpty() ? room.description : 'No description'}"></p>
                    <div class="room-card-footer">
                        <span class="room-card-meta" th:text="${room.members.size()} + ' members'"></span>
                        <a th:href="@{/chat/rooms/{id}(id=${room.id})}" class="btn btn-sm btn-primary">JOIN</a>
                    </div>
                </div>
            </th:block>

            <!-- Create room card -->
            <div class="room-card room-card-new">
                <div class="new-room-title">+ New Channel</div>
                <form th:action="@{/chat/rooms}" th:object="${newRoomForm}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="form-group">
                        <input type="text" th:field="*{name}" class="form-control sm"
                               placeholder="channel-name" required/>
                        <span class="field-error" th:if="${#fields.hasErrors('name')}"
                              th:errors="*{name}"></span>
                    </div>
                    <div class="form-group">
                        <input type="text" th:field="*{description}" class="form-control sm"
                               placeholder="Description (optional)"/>
                    </div>
                    <button type="submit" class="btn btn-sm btn-success btn-block">CREATE</button>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
