<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In — Nexus Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="auth-body">

<div class="auth-wrapper">
    <div class="auth-brand">
        <span class="brand-icon-lg">⬡</span>
        <h1 class="brand-title">NEXUS</h1>
        <p class="brand-sub">MESSAGING PLATFORM</p>
    </div>

    <div class="auth-card">
        <!-- Tabs -->
        <div class="auth-tabs">
            <a href="/auth/login"    class="auth-tab active">LOGIN</a>
            <a href="/auth/register" class="auth-tab">REGISTER</a>
        </div>

        <!-- Alerts -->
        <div th:if="${param.error}"  class="alert alert-error">Invalid username or password.</div>
        <div th:if="${param.logout}" class="alert alert-info">You have been signed out.</div>
        <div th:if="${success}"      class="alert alert-success" th:text="${success}"></div>

        <!-- Form -->
        <form th:action="@{/auth/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="username">USERNAME</label>
                <input id="username" name="username" type="text"
                       class="form-control" placeholder="your username" autocomplete="username" required/>
            </div>
            <div class="form-group">
                <label for="password">PASSWORD</label>
                <input id="password" name="password" type="password"
                       class="form-control" placeholder="••••••••" autocomplete="current-password" required/>
            </div>
            <button type="submit" class="btn btn-primary btn-block">SIGN IN</button>
        </form>

        <p class="auth-hint">Default: <code>admin</code> / <code>admin123</code></p>
    </div>
</div>
</body>
</html>
