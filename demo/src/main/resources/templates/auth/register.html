<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — Nexus Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="auth-body">

<div class="auth-wrapper">
    <div class="auth-brand">
        <span class="brand-icon-lg">⬡</span>
        <h1 class="brand-title">NEXUS</h1>
        <p class="brand-sub">MESSAGING PLATFORM</p>
    </div>

    <div class="auth-card">
        <!-- Tabs -->
        <div class="auth-tabs">
            <a href="/auth/login"    class="auth-tab">LOGIN</a>
            <a href="/auth/register" class="auth-tab active">REGISTER</a>
        </div>

        <!-- Error -->
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <!-- Form -->
        <form th:action="@{/auth/register}" th:object="${registerForm}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label>EMAIL</label>
                <input type="email" th:field="*{email}" class="form-control"
                       placeholder="you@example.com" autocomplete="email"/>
                <span class="field-error" th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}"></span>
            </div>
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" th:field="*{username}" class="form-control"
                       placeholder="choose a username" autocomplete="username"/>
                <span class="field-error" th:if="${#fields.hasErrors('username')}"
                      th:errors="*{username}"></span>
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" th:field="*{password}" class="form-control"
                       placeholder="min 6 characters" autocomplete="new-password"/>
                <span class="field-error" th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"></span>
            </div>
            <button type="submit" class="btn btn-primary btn-block">CREATE ACCOUNT</button>
        </form>

        <p class="auth-hint">Already have an account? <a href="/auth/login">Sign in</a></p>
    </div>
</div>
</body>
</html>
