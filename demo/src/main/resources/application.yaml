server:
  port: 8080

spring:
  application:
    name: demo
  datasource:
    url: jdbc:h2:mem:nexusmvc;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html

  servlet:
    session:
      timeout: 1d

logging:
  level:
    com.chat: INFO
    org.springframework.security: WARN